<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Starling WASM POC — Phase 0</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 2em; }
    h1 { color: #a78bfa; }
    .status { padding: 8px 16px; margin: 8px 0; border-radius: 4px; }
    .pass { background: #064e3b; color: #6ee7b7; }
    .fail { background: #7f1d1d; color: #fca5a5; }
    .running { background: #1e3a5f; color: #93c5fd; }
    .info { background: #374151; color: #d1d5db; }
    button { background: #7c3aed; color: white; border: none; padding: 10px 24px;
             border-radius: 6px; cursor: pointer; font-size: 1em; margin: 4px; }
    button:hover { background: #6d28d9; }
    button:disabled { background: #4b5563; cursor: not-allowed; }
    #results { margin-top: 1em; }
    #gpu-info { margin-bottom: 1em; }
  </style>
</head>
<body>
  <h1>Starling WASM POC — Phase 0</h1>
  <p>Validates: Burn/wgpu compiles to WASM, WebGPU tensor ops work, async GPU readback works.</p>

  <div id="gpu-info" class="status info">Checking WebGPU...</div>

  <div>
    <button id="btn-all" onclick="runAll()" disabled>Run All Tests</button>
    <button id="btn-matmul" onclick="runTest('matmul')" disabled>Test Matmul</button>
    <button id="btn-argmax" onclick="runTest('argmax')" disabled>Test Argmax</button>
    <button id="btn-large" onclick="runTest('large')" disabled>Test Large Matmul</button>
  </div>

  <div id="results"></div>

  <script type="module">
    import wasmInit, {
      init_runtime,
      test_matmul_async_readback,
      test_argmax_async,
      test_large_matmul,
      run_all_tests
    } from './pkg/wasm_poc.js';

    const gpuInfo = document.getElementById('gpu-info');
    const resultsDiv = document.getElementById('results');
    const buttons = document.querySelectorAll('button');

    function addResult(text, pass) {
      const div = document.createElement('div');
      div.className = `status ${pass ? 'pass' : 'fail'}`;
      div.textContent = text;
      resultsDiv.appendChild(div);
    }

    function addRunning(text) {
      const div = document.createElement('div');
      div.className = 'status running';
      div.textContent = text;
      div.id = 'running-indicator';
      resultsDiv.appendChild(div);
      return div;
    }

    // Check WebGPU
    async function checkGPU() {
      if (!navigator.gpu) {
        gpuInfo.textContent = 'WebGPU NOT available in this browser';
        gpuInfo.className = 'status fail';
        return false;
      }
      const adapter = await navigator.gpu.requestAdapter();
      if (!adapter) {
        gpuInfo.textContent = 'No WebGPU adapter found';
        gpuInfo.className = 'status fail';
        return false;
      }
      const info = adapter.info || {};
      const name = info.device || info.description || 'unknown';
      gpuInfo.textContent = `WebGPU: ${name} (${info.vendor || 'unknown vendor'})`;
      gpuInfo.className = 'status pass';
      return true;
    }

    // Initialize
    async function startup() {
      const hasGPU = await checkGPU();
      if (!hasGPU) return;

      const indicator = addRunning('Loading WASM module...');
      try {
        await wasmInit();
        indicator.textContent = 'WASM module loaded, initializing WebGPU runtime...';
        indicator.className = 'status running';

        const runtimeInfo = await init_runtime();
        indicator.textContent = `WASM + WebGPU ready: ${runtimeInfo}`;
        indicator.className = 'status pass';
        buttons.forEach(b => b.disabled = false);
      } catch (e) {
        indicator.textContent = `WASM init failed: ${e.message}`;
        indicator.className = 'status fail';
        console.error(e);
      }
    }

    // Expose test functions globally
    window.runTest = async function(name) {
      buttons.forEach(b => b.disabled = true);
      const indicator = addRunning(`Running ${name} test...`);
      try {
        let result;
        if (name === 'matmul') result = await test_matmul_async_readback();
        else if (name === 'argmax') result = await test_argmax_async();
        else if (name === 'large') result = await test_large_matmul();
        const pass = result.includes('PASS');
        indicator.textContent = result;
        indicator.className = `status ${pass ? 'pass' : 'fail'}`;
      } catch (e) {
        indicator.textContent = `${name} FAILED: ${e.message}`;
        indicator.className = 'status fail';
        console.error(e);
      }
      buttons.forEach(b => b.disabled = false);
    };

    window.runAll = async function() {
      buttons.forEach(b => b.disabled = true);
      const indicator = addRunning('Running all tests...');
      try {
        const result = await run_all_tests();
        const allPass = !result.includes('FAIL');
        indicator.textContent = `All tests: ${allPass ? 'ALL PASSED' : 'SOME FAILED'}\n${result}`;
        indicator.className = `status ${allPass ? 'pass' : 'fail'}`;
        indicator.style.whiteSpace = 'pre-wrap';
      } catch (e) {
        indicator.textContent = `Tests FAILED: ${e.message}`;
        indicator.className = 'status fail';
        console.error(e);
      }
      buttons.forEach(b => b.disabled = false);
    };

    startup();
  </script>
</body>
</html>
